def hostTestBuildDir = layout.buildDirectory.dir("nativeHostTest")
def hostTestBinary = hostTestBuildDir.map { it.file("outbox_core_test").asFile }
def hostStressTestBinary = hostTestBuildDir.map { it.file("outbox_core_stress_test").asFile }
def isWindowsHost = System.getProperty("os.name").toLowerCase(Locale.US).contains("windows")
def isMacHost = System.getProperty("os.name").toLowerCase(Locale.US).contains("mac")
def hostCompiler = providers.environmentVariable("CC").orElse("cc").get()
def hostCxxCompiler = providers.environmentVariable("CXX").orElse("c++").get()
def hostJniBuildDir = layout.buildDirectory.dir("nativeHostJniTest")
def hostJniLibraryName = isMacHost ? "liboutbox_host_jni.dylib"
        : "liboutbox_host_jni.so"
def hostJniLibrary = hostJniBuildDir.map { it.file(hostJniLibraryName).asFile }
def hostJniControlObject = hostJniBuildDir.map { it.file("outbox_control.o").asFile }
def hostJniCoreObject = hostJniBuildDir.map { it.file("outbox_core.o").asFile }
def hostJniFrameObject = hostJniBuildDir.map { it.file("outbox_frame.o").asFile }
def hostJniQueueObject = hostJniBuildDir.map { it.file("outbox_queue.o").asFile }
def hostJniSpoolObject = hostJniBuildDir.map { it.file("outbox_spool.o").asFile }
def hostJniWriterObject = hostJniBuildDir.map { it.file("outbox_writer.o").asFile }
def hostJniProductionBridgeObject = hostJniBuildDir.map { it.file("outbox_jni.o").asFile }
def hostJniTestBridgeObject = hostJniBuildDir.map { it.file("outbox_host_jni_test.o").asFile }
def jniJavaHome = providers.systemProperty("java.home").get()
def jniIncludeDir = file("${jniJavaHome}/include")
def jniPlatformIncludeDir = file("${jniJavaHome}/include/${isMacHost ? "darwin" : "linux"}")
def canBuildHostJni = !isWindowsHost && jniIncludeDir.exists() && jniPlatformIncludeDir.exists()

// Host JNI integration is opt-in because it builds and loads a host shared
// library from the same production C/JNI objects used by Android, then reflects
// raw file descriptors for JVM-only pipe testing. This keeps the test close to
// the real app path without requiring an emulator or instrumented test run.
// Run it explicitly with:
// ./gradlew :android-outbox:testDebugUnitTest \
//   --tests "io.github.phuongtran.androidoutbox.OutboxHostJniIntegrationTest" \
//   -PandroidOutboxHostJni=true \
//   --console=plain
def isHostJniEnabled = providers.gradleProperty("androidOutboxHostJni")
        .map { it.toBoolean() }
        .orElse(false)
// Host JNI race diagnostics are separate from the regular integration path so
// the normal protocol test remains small and stable. Run it explicitly with:
// ./gradlew :android-outbox:testDebugUnitTest \
//   --tests "io.github.phuongtran.androidoutbox.OutboxHostJniShutdownRaceTest" \
//   -PandroidOutboxHostJniRace=true \
//   --console=plain
def isHostJniRaceEnabled = providers.gradleProperty("androidOutboxHostJniRace")
        .map { it.toBoolean() }
        .orElse(false)
def isAnyHostJniEnabled = providers.provider {
    isHostJniEnabled.get() || isHostJniRaceEnabled.get()
}

// Stress is an opt-in diagnostic target, not part of CI smoke tests. It is
// intentionally gated because it writes many records and its runtime depends on
// host CPU and filesystem behavior.
// Run it explicitly with:
// ./gradlew :android-outbox:testNativeHostStress \
//   -PandroidOutboxStress=true \
//   --console=plain
def isNativeStressEnabled = providers.gradleProperty("androidOutboxStress")
        .map { it.toBoolean() }
        .orElse(false)
def nativeStressWorkers = providers.gradleProperty("androidOutboxStressWorkers").orElse("8")
def nativeStressRecordsPerWorker = providers.gradleProperty("androidOutboxStressRecordsPerWorker")
        .orElse("20000")
def nativeStressQueueCapacity = providers.gradleProperty("androidOutboxStressQueueCapacity")
        .orElse("1024")
def nativeStressMaxRecordBytes = providers.gradleProperty("androidOutboxStressMaxRecordBytes")
        .orElse("256")

// Host-native C tests are manual diagnostics. They stay detached from CI so the
// Android library build only packages the .so by default.
// Run them explicitly with:
// ./gradlew :android-outbox:testNativeHost \
//   -PandroidOutboxHostNative=true \
//   --console=plain
def isNativeHostTestEnabled = providers.gradleProperty("androidOutboxHostNative")
        .map { it.toBoolean() }
        .orElse(false)

def nativeMainSources = [
        file("src/main/cpp/outbox_control.c"),
        file("src/main/cpp/outbox_core.c"),
        file("src/main/cpp/outbox_frame.c"),
        file("src/main/cpp/outbox_queue.c"),
        file("src/main/cpp/outbox_spool.c"),
        file("src/main/cpp/outbox_writer.c"),
]
def nativeMainHeaders = [
        file("src/main/cpp/outbox_control.h"),
        file("src/main/cpp/outbox_core.h"),
        file("src/main/cpp/outbox_frame.h"),
        file("src/main/cpp/outbox_internal.h"),
        file("src/main/cpp/outbox_queue.h"),
        file("src/main/cpp/outbox_spool.h"),
        file("src/main/cpp/outbox_writer.h"),
]
def nativeHostCompilerArgs = [
        "-std=c17",
        "-D_GNU_SOURCE",
        "-D_DARWIN_C_SOURCE",
        "-Wall",
        "-Wextra",
        "-Werror",
        "-pthread",
        "-I${projectDir}/src/main/cpp",
]
def nativeHostJniCCompilerArgs = nativeHostCompilerArgs + ["-fPIC"]
def nativeHostJniCxxCompilerArgs = [
        "-std=c++17",
        "-Wall",
        "-Wextra",
        "-Werror",
        "-fPIC",
        "-pthread",
        "-I${projectDir}/src/main/cpp",
        "-I${jniIncludeDir}",
        "-I${jniPlatformIncludeDir}",
]

tasks.register("compileNativeHostTest", Exec) {
    group = "verification"
    description = "Compiles host-side C tests for the AndroidOutBox core."
    onlyIf {
        !isWindowsHost && isNativeHostTestEnabled.get()
    }

    inputs.files(nativeMainSources, nativeMainHeaders, file("src/hostTest/c/outbox_core_test.c"))
    outputs.file(hostTestBinary)

    doFirst {
        hostTestBuildDir.get().asFile.mkdirs()
    }
    commandLine(
            [hostCompiler] +
                    nativeHostCompilerArgs +
                    nativeMainSources.collect { it.absolutePath } +
                    [
                            file("src/hostTest/c/outbox_core_test.c").absolutePath,
                            "-o",
                            hostTestBinary.get().absolutePath,
                    ],
    )
}

tasks.register("testNativeHost", Exec) {
    group = "verification"
    description = "Runs manual host-side C tests. Enable with -PandroidOutboxHostNative=true."
    dependsOn("compileNativeHostTest")
    onlyIf {
        !isWindowsHost && isNativeHostTestEnabled.get()
    }

    commandLine(hostTestBinary.get().absolutePath)
}

tasks.register("compileNativeHostStressTest", Exec) {
    group = "verification"
    description = "Compiles the opt-in native stress test for the AndroidOutBox core."
    onlyIf {
        !isWindowsHost && isNativeStressEnabled.get()
    }

    inputs.files(
            nativeMainSources,
            nativeMainHeaders,
            file("src/hostTest/c/outbox_core_stress_test.c"),
    )
    outputs.file(hostStressTestBinary)

    doFirst {
        hostTestBuildDir.get().asFile.mkdirs()
    }
    commandLine(
            [hostCompiler] +
                    nativeHostCompilerArgs +
                    nativeMainSources.collect { it.absolutePath } +
                    [
                            file("src/hostTest/c/outbox_core_stress_test.c").absolutePath,
                            "-o",
                            hostStressTestBinary.get().absolutePath,
                    ],
    )
}

tasks.register("testNativeHostStress", Exec) {
    group = "verification"
    description = "Runs the opt-in native stress test. Enable with -PandroidOutboxStress=true."
    dependsOn("compileNativeHostStressTest")
    onlyIf {
        !isWindowsHost && isNativeStressEnabled.get()
    }

    commandLine(
            hostStressTestBinary.get().absolutePath,
            nativeStressWorkers.get(),
            nativeStressRecordsPerWorker.get(),
            nativeStressQueueCapacity.get(),
            nativeStressMaxRecordBytes.get(),
    )
}

def registerHostJniCObject = { String taskName,
                               String taskDescription,
                               File sourceFile,
                               outputFile,
                               inputFiles ->
    tasks.register(taskName, Exec) {
        group = "verification"
        description = taskDescription
        onlyIf {
            canBuildHostJni && isAnyHostJniEnabled.get()
        }

        inputs.files(inputFiles)
        outputs.file(outputFile)

        doFirst {
            hostJniBuildDir.get().asFile.mkdirs()
        }
        commandLine(
                [hostCompiler] +
                        nativeHostJniCCompilerArgs +
                        [
                                "-c",
                                sourceFile.absolutePath,
                                "-o",
                                outputFile.get().absolutePath,
                        ],
        )
    }
}

def registerHostJniCxxObject = { String taskName,
                                 String taskDescription,
                                 File sourceFile,
                                 outputFile,
                                 inputFiles ->
    tasks.register(taskName, Exec) {
        group = "verification"
        description = taskDescription
        onlyIf {
            canBuildHostJni && isAnyHostJniEnabled.get()
        }

        inputs.files(inputFiles)
        outputs.file(outputFile)

        doFirst {
            hostJniBuildDir.get().asFile.mkdirs()
        }
        commandLine(
                [hostCxxCompiler] +
                        nativeHostJniCxxCompilerArgs +
                        [
                                "-c",
                                sourceFile.absolutePath,
                                "-o",
                                outputFile.get().absolutePath,
                        ],
        )
    }
}

registerHostJniCObject(
        "compileNativeHostJniCoreObject",
        "Compiles the AndroidOutBox C core for the host JNI shared library.",
        file("src/main/cpp/outbox_core.c"),
        hostJniCoreObject,
        [
                file("src/main/cpp/outbox_control.h"),
                file("src/main/cpp/outbox_core.c"),
                file("src/main/cpp/outbox_core.h"),
                file("src/main/cpp/outbox_frame.h"),
                file("src/main/cpp/outbox_internal.h"),
                file("src/main/cpp/outbox_queue.h"),
                file("src/main/cpp/outbox_spool.h"),
                file("src/main/cpp/outbox_writer.h"),
        ],
)
registerHostJniCObject(
        "compileNativeHostJniControlObject",
        "Compiles the AndroidOutBox control plane for the host JNI shared library.",
        file("src/main/cpp/outbox_control.c"),
        hostJniControlObject,
        [
                file("src/main/cpp/outbox_control.c"),
                file("src/main/cpp/outbox_control.h"),
                file("src/main/cpp/outbox_core.h"),
                file("src/main/cpp/outbox_frame.h"),
                file("src/main/cpp/outbox_internal.h"),
                file("src/main/cpp/outbox_spool.h"),
        ],
)
registerHostJniCObject(
        "compileNativeHostJniFrameObject",
