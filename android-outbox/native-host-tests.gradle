registerHostJniCObject(
        "compileNativeHostJniQueueObject",
        "Compiles the AndroidOutBox queue helpers for the host JNI shared library.",
        file("src/main/cpp/outbox_queue.c"),
        hostJniQueueObject,
        [
                file("src/main/cpp/outbox_internal.h"),
                file("src/main/cpp/outbox_queue.c"),
                file("src/main/cpp/outbox_queue.h"),
        ],
)
registerHostJniCObject(
        "compileNativeHostJniSpoolObject",
        "Compiles the AndroidOutBox spool helpers for the host JNI shared library.",
        file("src/main/cpp/outbox_spool.c"),
        hostJniSpoolObject,
        [
                file("src/main/cpp/outbox_frame.h"),
                file("src/main/cpp/outbox_internal.h"),
                file("src/main/cpp/outbox_spool.c"),
