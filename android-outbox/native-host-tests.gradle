registerHostJniCxxObject(
        "compileNativeHostJniProductionBridgeObject",
        "Compiles the production JNI bridge for the host JNI shared library.",
        file("src/main/cpp/outbox_jni.cpp"),
        hostJniProductionBridgeObject,
        [
                file("src/main/cpp/outbox_core.h"),
                file("src/main/cpp/outbox_jni.cpp"),
        ],
)
registerHostJniCxxObject(
        "compileNativeHostJniTestBridgeObject",
        "Compiles the host-only JNI bridge for JVM integration tests.",
        file("src/hostTest/c/outbox_host_jni_test.cpp"),
        hostJniTestBridgeObject,
        [
                file("src/main/cpp/outbox_core.h"),
                file("src/hostTest/c/outbox_host_jni_test.cpp"),
        ],
)

tasks.register("compileNativeHostJniTestLibrary", Exec) {
    group = "verification"
    description = "Builds a host-loadable JNI shared library for JVM integration tests."
    dependsOn(
            "compileNativeHostJniControlObject",
            "compileNativeHostJniCoreObject",
            "compileNativeHostJniFrameObject",
            "compileNativeHostJniQueueObject",
            "compileNativeHostJniSpoolObject",
            "compileNativeHostJniWriterObject",
            "compileNativeHostJniProductionBridgeObject",
            "compileNativeHostJniTestBridgeObject",
    )
    onlyIf {
        canBuildHostJni && isAnyHostJniEnabled.get()
    }

    inputs.files(
            hostJniControlObject,
            hostJniCoreObject,
            hostJniFrameObject,
            hostJniQueueObject,
            hostJniSpoolObject,
            hostJniWriterObject,
            hostJniProductionBridgeObject,
            hostJniTestBridgeObject,
    )
    outputs.file(hostJniLibrary)

    commandLine(
            hostCxxCompiler,
            isMacHost ? "-dynamiclib" : "-shared",
            "-pthread",
            hostJniControlObject.get().absolutePath,
            hostJniCoreObject.get().absolutePath,
            hostJniFrameObject.get().absolutePath,
            hostJniQueueObject.get().absolutePath,
            hostJniSpoolObject.get().absolutePath,
            hostJniWriterObject.get().absolutePath,
            hostJniProductionBridgeObject.get().absolutePath,
            hostJniTestBridgeObject.get().absolutePath,
            "-o",
            hostJniLibrary.get().absolutePath,
    )
}

tasks.matching { task ->
    task.name == "testDebugUnitTest"
}.configureEach { task ->
    if (canBuildHostJni && isAnyHostJniEnabled.get()) {
        task.dependsOn("compileNativeHostJniTestLibrary")
        task.jvmArgs("--add-opens=java.base/java.io=ALL-UNNAMED")
        task.testLogging {
            events "passed", "skipped", "failed", "standardOut", "standardError"
            showStandardStreams = true
        }
        // Host JNI is diagnostic-only, so explicit runs should not be hidden by
        // a stale Gradle test result.
        task.outputs.upToDateWhen { false }
        task.doFirst {
            systemProperty("androidoutbox.hostJniLibrary", hostJniLibrary.get().absolutePath)
            systemProperty("androidoutbox.hostJniRace", isHostJniRaceEnabled.get().toString())
        }
    }
}
