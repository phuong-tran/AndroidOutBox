registerHostJniCObject(
        "compileNativeHostJniWriterObject",
        "Compiles the AndroidOutBox writer loop for the host JNI shared library.",
        file("src/main/cpp/outbox_writer.c"),
        hostJniWriterObject,
        [
                file("src/main/cpp/outbox_frame.h"),
                file("src/main/cpp/outbox_internal.h"),
                file("src/main/cpp/outbox_queue.h"),
                file("src/main/cpp/outbox_spool.h"),
